substrate-frame-rpc-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603" }

# Build Utilities
substrate-build-script-utils = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603" }
substrate-wasm-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603" }

# Local Projects
aether-runtime = { path = "runtime", default-features = false }
aether-pallet-template = { path = "pallets/template", default-features = false }
aether-node = { path = "node", default-features = false }
