name: ci/runtime-integrity

on:
  pull_request:
    branches:
      - dev
      - master
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  WASM_BUILD_NO_COLOR: 1

jobs:
  runtime-integrity:
    name: runtime-integrity
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Rust CI environment
        uses: ./.github/actions/setup-rust
      - name: Build runtime (native + wasm via wasm-builder)
        run: cargo build -p aether-runtime --locked --release
      - name: Check runtime in no_std wasm mode
        run: cargo check -p aether-runtime --locked --no-default-features --target wasm32-unknown-unknown
      - name: Check runtime benchmark/try-runtime feature compilation
        run: cargo check -p aether-runtime --locked --features runtime-benchmarks,try-runtime
